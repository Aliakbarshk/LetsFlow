
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Flow | WhatsApp Automation & Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --wa-green: #25d366;
            --wa-bg: #0b141a;
            --wa-panel: #111b21;
            --wa-header: #202c33;
            --wa-bubble-me: #005c4b;
            --wa-bubble-them: #202c33;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
            color: #ffffff;
            scroll-behavior: smooth;
            cursor: none;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .cursor-dot {
            position: fixed;
            top: 0; left: 0;
            width: 8px; height: 8px;
            background-color: var(--wa-green);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }
        .cursor-bubble {
            position: fixed;
            top: 0; left: 0;
            width: 40px; height: 40px;
            background-color: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s;
        }
        .cursor-active .cursor-bubble { width: 80px; height: 80px; }

        .wa-bg-pattern {
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-repeat: repeat;
            opacity: 0.05;
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 5s ease-in-out infinite; }
        
        .splash-exit { 
            transform: translateY(-100%);
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
    </style>
